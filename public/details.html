<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Telco X — Details</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    /* Detail page plan-card grid */
    .tx-detail-card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 640px) {
      .tx-detail-card-grid { grid-template-columns: 1fr; }
    }

    /* Provider row redesign */
    .tx-provider-row {
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 16px;
    }
    .tx-provider-name { font-weight: var(--font-semibold); font-size: var(--text-body); }
    .tx-provider-meta { font-size: 13px; color: var(--color-text-muted); margin-top: 2px; }

    /* Subscriber summary strip */
    .tx-strip {
      background: var(--color-navy); color: #fff;
      border-radius: var(--radius-card); padding: var(--space-5);
      margin-bottom: 20px; display: flex; gap: var(--space-6); flex-wrap: wrap;
    }
    .tx-strip dt { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; opacity: .6; margin-bottom: 4px; }
    .tx-strip dd { font-weight: var(--font-semibold); margin: 0; }
  </style>
</head>
<body>
  <header class="tx-header">
    <a href="/" class="tx-logo" aria-label="Telco X home">
      <span class="tx-logo__badge" aria-hidden="true">TX</span>
      <span class="tx-logo__name">Telco&nbsp;<span class="tx-logo__x">X</span></span>
    </a>
    <nav class="tx-nav" aria-label="Main navigation">
      <a href="/" class="tx-nav__link">Check address</a>
      <a href="/wifi.html" class="tx-nav__link">Wi-Fi setup</a>
    </nav>
  </header>

  <main class="tx-container" style="max-width:960px">

    <button class="tx-btn--back" id="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
      </svg>
      Back
    </button>

    <div class="tx-title-row" style="margin-bottom:8px">
      <h1 id="page-title" style="font-size:var(--text-page-heading);line-height:var(--lh-page-heading);margin:0"></h1>
      <span id="page-badge" class="tx-status" hidden></span>
    </div>
    <p id="page-desc" style="font-size:var(--text-body);color:var(--color-text-muted);margin:0 0 24px" hidden></p>

    <div id="page-error" class="tx-card" hidden>
      <p class="tx-error" id="page-error-msg" style="font-size:var(--text-body)"></p>
      <p id="page-error-sub" style="color:var(--color-text-muted);font-size:var(--text-label);margin-top:var(--space-2)"></p>
    </div>

    <p id="loading" class="tx-muted" style="padding:24px 0">Loading…</p>

    <!-- DETAILS mode -->
    <div id="details-section" hidden>
      <dl class="tx-strip" id="summary-strip"></dl>

      <div class="tx-card">
        <p class="tx-section-title">Plan details</p>
        <div class="tx-detail-row"><span class="tx-detail-label">Product</span><span class="tx-detail-value" id="d-product"></span></div>
        <div class="tx-detail-row"><span class="tx-detail-label">Account ref</span><span class="tx-detail-value" id="d-account"></span></div>
        <div class="tx-detail-row"><span class="tx-detail-label">Connected since</span><span class="tx-detail-value" id="d-connected"></span></div>
        <div class="tx-detail-row"><span class="tx-detail-label">Upgrade eligible</span><span class="tx-detail-value" id="d-upgrade"></span></div>
      </div>

      <div class="tx-detail-card-grid">
        <div class="tx-card" style="margin:0">
          <p class="tx-section-title">Network health</p>
          <div class="tx-detail-row"><span class="tx-detail-label">Status</span><span id="d-net-rag" class="tx-rag"></span></div>
          <div class="tx-detail-row"><span class="tx-detail-label">Download sync</span><span class="tx-detail-value" id="d-net-down"></span></div>
          <div class="tx-detail-row"><span class="tx-detail-label">Upload sync</span><span class="tx-detail-value" id="d-net-up"></span></div>
          <div class="tx-detail-row"><span class="tx-detail-label">Latency</span><span class="tx-detail-value" id="d-net-latency"></span></div>
          <div class="tx-detail-row"><span class="tx-detail-label">Last outage</span><span class="tx-detail-value" id="d-net-outage"></span></div>
        </div>
        <div class="tx-card" style="margin:0">
          <p class="tx-section-title">Service health</p>
          <div class="tx-detail-row"><span class="tx-detail-label">Status</span><span id="d-svc-rag" class="tx-rag"></span></div>
          <div class="tx-detail-row"><span class="tx-detail-label">Open tickets</span><span class="tx-detail-value" id="d-svc-tickets"></span></div>
          <div class="tx-detail-row"><span class="tx-detail-label">Last appointment</span><span class="tx-detail-value" id="d-svc-appt"></span></div>
        </div>
      </div>
    </div>

    <!-- PROVIDERS mode -->
    <div id="providers-section" hidden>
      <p id="providers-subhead" style="font-size:var(--text-body);color:var(--color-text-muted);margin:0 0 20px"></p>

      <!-- Selected plan summary card -->
      <div id="selected-plan" class="tx-card" style="margin-bottom:20px;display:none">
        <p class="tx-section-title">Selected plan</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div>
            <p style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-muted);margin:0 0 4px">Download</p>
            <p style="font-size:28px;font-weight:700;margin:0;line-height:1" id="plan-down">—<span style="font-size:13px;font-weight:500;margin-left:2px">Mbps</span></p>
          </div>
          <div>
            <p style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-muted);margin:0 0 4px">Upload</p>
            <p style="font-size:28px;font-weight:700;margin:0;line-height:1" id="plan-up">—<span style="font-size:13px;font-weight:500;margin-left:2px">Mbps</span></p>
          </div>
        </div>
      </div>

      <div id="providers-list"></div>
    </div>

  </main>
  <script src="/js/api.js"></script>
  <script src="/js/details.js"></script>
</body>
</html>
